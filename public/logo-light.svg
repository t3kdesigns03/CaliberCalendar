<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" fill="none">
  <!-- Outer C arc - white -->
  <path d="M62 8 A50 50 0 1 0 62 92" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Inner C arc - bright blue -->
  <path d="M57 24 A32 32 0 1 0 57 76" stroke="#4DA6FF" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Calendar body -->
  <rect x="32" y="36" width="28" height="24" rx="3" fill="white" stroke="white" stroke-width="1"/>
  <rect x="32" y="44" width="28" height="16" rx="0" fill="#0A1929"/>
  <!-- Rings -->
  <rect x="39" y="34" width="3" height="6" rx="1.5" fill="#4DA6FF"/>
  <rect x="52" y="34" width="3" height="6" rx="1.5" fill="#4DA6FF"/>
  <!-- Calendar grid -->
  <rect x="35" y="47" width="3" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="41" y="47" width="3" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="47" y="47" width="3" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <!-- Check circle -->
  <circle cx="50" cy="55" r="5" fill="#4DA6FF"/>
  <polyline points="47,55 49.5,57.5 53,52.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark -->
  <text x="90" y="56" font-family="Inter, Arial Black, sans-serif" font-size="32" font-weight="900" letter-spacing="3" fill="white">CALIBER</text>
  <!-- Divider line + CALENDAR -->
  <line x1="90" y1="65" x2="103" y2="65" stroke="#4DA6FF" stroke-width="2" stroke-linecap="round"/>
  <text x="108" y="76" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="5" fill="#4DA6FF">CALENDAR</text>
  <line x1="284" y1="65" x2="297" y2="65" stroke="#4DA6FF" stroke-width="2" stroke-linecap="round"/>
</svg>
