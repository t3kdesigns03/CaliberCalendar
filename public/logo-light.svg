<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none" overflow="visible">

  <!-- ── Icon mark ────────────────────────────────────────── -->

  <!-- Outer C arc — white, thicker for visual weight -->
  <path d="M54 6 A28 28 0 1 0 54 62"
        stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Inner C — brand blue -->
  <path d="M50 18 A16 16 0 1 0 50 50"
        stroke="#4DA6FF" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- Calendar body — stroked only, no fill -->
  <rect x="26" y="26" width="20" height="17" rx="2.5"
        stroke="white" stroke-width="2" fill="none"/>

  <!-- Header divider line -->
  <line x1="26" y1="32" x2="46" y2="32"
        stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Binding rings — brand blue, slightly larger -->
  <rect x="29.5" y="23.5" width="3" height="5.5" rx="1.5" fill="#4DA6FF"/>
  <rect x="39"   y="23.5" width="3" height="5.5" rx="1.5" fill="#4DA6FF"/>

  <!-- Day dots -->
  <circle cx="30" cy="37.5" r="1.4" fill="white" opacity="0.75"/>
  <circle cx="36" cy="37.5" r="1.4" fill="white" opacity="0.75"/>
  <circle cx="42" cy="37.5" r="1.4" fill="white" opacity="0.75"/>

  <!-- Check-circle badge — brand blue filled -->
  <circle cx="41" cy="39" r="4.8" fill="#4DA6FF"/>
  <polyline points="38.2,39 40.4,41.4 44,36.2"
            stroke="white" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Wordmark ──────────────────────────────────────────── -->

  <!-- CALIBER — primary wordmark -->
  <text x="78" y="38"
        font-family="Inter, Arial Black, sans-serif"
        font-size="24" font-weight="900" letter-spacing="2.5"
        fill="white">CALIBER</text>

  <!-- — CALENDAR — sub-wordmark -->
  <line x1="78"  y1="47" x2="89"  y2="47"
        stroke="#4DA6FF" stroke-width="1.8" stroke-linecap="round"/>
  <text x="93" y="57"
        font-family="Inter, Arial, sans-serif"
        font-size="12" font-weight="600" letter-spacing="4"
        fill="#4DA6FF">CALENDAR</text>
  <line x1="202" y1="47" x2="213" y2="47"
        stroke="#4DA6FF" stroke-width="1.8" stroke-linecap="round"/>

</svg>
