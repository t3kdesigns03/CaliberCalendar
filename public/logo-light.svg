<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none">
  <!-- ── Icon mark (left, 68×68) ──────────────────────── -->

  <!-- Outer C arc - white -->
  <path d="M54 6 A28 28 0 1 0 54 62" stroke="white" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Inner C - bright blue -->
  <path d="M50 18 A16 16 0 1 0 50 50" stroke="#4DA6FF" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Calendar icon - NO filled rect bg, just stroked border -->
  <rect x="26" y="26" width="20" height="17" rx="2.5" stroke="white" stroke-width="1.5" fill="none"/>
  <line x1="26" y1="32" x2="46" y2="32" stroke="white" stroke-width="1.5"/>
  <!-- Rings -->
  <rect x="30" y="24" width="2.5" height="5" rx="1.25" fill="#4DA6FF"/>
  <rect x="39" y="24" width="2.5" height="5" rx="1.25" fill="#4DA6FF"/>
  <!-- Grid dots -->
  <circle cx="30" cy="37" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="36" cy="37" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="42" cy="37" r="1.2" fill="white" opacity="0.7"/>
  <!-- Check circle - no white bg, just circle + check -->
  <circle cx="41" cy="39" r="4.5" fill="#4DA6FF"/>
  <polyline points="38.5,39 40.5,41 43.5,36.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Wordmark (right of icon) ──────────────────────── -->
  <text x="78" y="38" font-family="Inter, Arial Black, sans-serif" font-size="24" font-weight="900" letter-spacing="2.5" fill="white">CALIBER</text>
  <!-- Dash + CALENDAR + Dash -->
  <line x1="78" y1="46" x2="88" y2="46" stroke="#4DA6FF" stroke-width="1.8" stroke-linecap="round"/>
  <text x="92" y="57" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="4" fill="#4DA6FF">CALENDAR</text>
  <line x1="202" y1="46" x2="212" y2="46" stroke="#4DA6FF" stroke-width="1.8" stroke-linecap="round"/>
</svg>
