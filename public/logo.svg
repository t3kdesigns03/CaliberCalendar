<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" fill="none">
  <!-- Outer C arc - dark navy -->
  <path d="M95 10 A75 75 0 1 0 95 130" stroke="#0A2463" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Inner C arc - bright blue -->
  <path d="M88 32 A48 48 0 1 0 88 108" stroke="#1E6FD9" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- Calendar icon -->
  <rect x="52" y="54" width="38" height="34" rx="4" fill="white" stroke="#0A2463" stroke-width="2"/>
  <line x1="52" y1="64" x2="90" y2="64" stroke="#0A2463" stroke-width="2"/>
  <rect x="60" y="55" width="4" height="7" rx="2" fill="#1E6FD9"/>
  <rect x="78" y="55" width="4" height="7" rx="2" fill="#1E6FD9"/>
  <!-- Calendar grid dots -->
  <rect x="57" y="69" width="4" height="4" rx="1" fill="#0A2463"/>
  <rect x="65" y="69" width="4" height="4" rx="1" fill="#0A2463"/>
  <rect x="73" y="69" width="4" height="4" rx="1" fill="#0A2463"/>
  <!-- Checkmark circle -->
  <circle cx="76" cy="80" r="7" fill="#1E6FD9"/>
  <polyline points="72,80 75,83 80,77" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- CALIBER text -->
  <text x="115" y="74" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" letter-spacing="4" fill="#0A2463">CALIBER</text>

  <!-- Dashes + CALENDAR text -->
  <line x1="115" y1="88" x2="130" y2="88" stroke="#1E6FD9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="135" y="100" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="#1E6FD9">CALENDAR</text>
  <line x1="325" y1="88" x2="340" y2="88" stroke="#1E6FD9" stroke-width="2.5" stroke-linecap="round"/>
</svg>
